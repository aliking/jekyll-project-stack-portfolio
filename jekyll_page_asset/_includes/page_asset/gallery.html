<script>
  (function () {
    var MOUNTED_ATTR = "data-gallery-mounted";

    function mountGallery() {
      var lightboxMount = document.getElementById("page-asset-gallery-lightbox");
      var controlsMount = document.getElementById("page-asset-gallery-controls");

      if (lightboxMount && lightboxMount.hasAttribute(MOUNTED_ATTR)) {
        return;
      }

      if (lightboxMount) {
        lightboxMount.innerHTML =
          '<div class="gallery-lightbox" id="gallery-lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>' +
          '<div class="gallery-lightbox-inner" tabindex="-1">' +
          '<img class="gallery-lightbox-image" id="gallery-lightbox-image" src="" alt="">' +
          '</div>' +
          '</div>';
        lightboxMount.setAttribute(MOUNTED_ATTR, "true");
      }

      if (controlsMount) {
        controlsMount.innerHTML =
          '<div class="sidebar-gallery-controls" id="sidebar-gallery-controls" data-open="false" hidden aria-label="Gallery controls">' +
          '<button class="btn gallery-control-button" type="button" id="gallery-prev" data-gallery-focusable="true" aria-label="Previous image">&lt;&lt;</button>' +
          '<button class="btn gallery-control-button" type="button" id="gallery-close" data-gallery-focusable="true">Show Thumbnails</button>' +
          '<button class="btn gallery-control-button" type="button" id="gallery-next" data-gallery-focusable="true" aria-label="Next image">&gt;&gt;</button>' +
          '</div>';
        controlsMount.setAttribute(MOUNTED_ATTR, "true");
      }

      initLightbox();
      initControls();
    }

    function initLightbox() {
      var lightbox = document.getElementById("gallery-lightbox");
      var lightboxImage = document.getElementById("gallery-lightbox-image");
      var mainContent = document.getElementById("main-content");
      var focusableSelector = "[data-gallery-focusable='true']:not([hidden]):not([disabled])";

      if (!lightbox || !lightboxImage || !mainContent) {
        return;
      }

      var state = {
        open: false,
        galleryId: null,
        index: 0,
        items: [],
        trigger: null
      };

      function getGalleryItems(galleryId) {
        var container = document.querySelector("[data-gallery='" + galleryId + "']");
        if (!container) {
          return [];
        }

        return Array.prototype.slice
          .call(container.querySelectorAll("[data-gallery-thumb='true']"))
          .map(function (thumb) {
            return {
              src: thumb.getAttribute("data-gallery-src"),
              alt: thumb.getAttribute("data-gallery-alt") || "Gallery image"
            };
          });
      }

      function emitState() {
        document.dispatchEvent(new CustomEvent("gallerylightbox:statechange", {
          detail: {
            open: state.open,
            galleryId: state.galleryId,
            index: state.index,
            total: state.items.length
          }
        }));
      }

      function renderImage() {
        if (!state.open || state.items.length === 0) {
          return;
        }

        var current = state.items[state.index];
        lightboxImage.src = current.src;
        lightboxImage.alt = current.alt;
        emitState();
      }

      function focusFirstControl() {
        var focusable = document.querySelectorAll(focusableSelector);
        if (focusable.length > 0) {
          focusable[0].focus();
          return;
        }

        var inner = lightbox.querySelector(".gallery-lightbox-inner");
        if (inner) {
          inner.focus();
        }
      }

      function open(galleryId, index, trigger) {
        var items = getGalleryItems(galleryId);
        if (items.length === 0) {
          return;
        }

        state.open = true;
        state.galleryId = galleryId;
        state.items = items;
        state.index = Math.max(0, Math.min(index, items.length - 1));
        state.trigger = trigger || document.activeElement;

        lightbox.hidden = false;
        document.body.classList.add("gallery-lightbox-open");
        renderImage();
        focusFirstControl();
      }

      function close() {
        if (!state.open) {
          return;
        }

        var trigger = state.trigger;
        state.open = false;
        state.galleryId = null;
        state.items = [];
        state.index = 0;
        state.trigger = null;

        lightbox.hidden = true;
        lightboxImage.src = "";
        lightboxImage.alt = "";
        document.body.classList.remove("gallery-lightbox-open");
        emitState();

        if (trigger && typeof trigger.focus === "function") {
          trigger.focus();
        }
      }

      function goNext() {
        if (!state.open || state.items.length === 0) {
          return;
        }

        state.index = (state.index + 1) % state.items.length;
        renderImage();
      }

      function goPrevious() {
        if (!state.open || state.items.length === 0) {
          return;
        }

        state.index = (state.index - 1 + state.items.length) % state.items.length;
        renderImage();
      }

      document.addEventListener("click", function (event) {
        var thumb = event.target.closest("[data-gallery-thumb='true']");
        if (!thumb) {
          return;
        }

        event.preventDefault();
        open(
          thumb.getAttribute("data-gallery-id"),
          Number(thumb.getAttribute("data-gallery-index")) || 0,
          thumb
        );
      });

      lightbox.addEventListener("wheel", function (event) {
        if (state.open) {
          event.preventDefault();
        }
      }, { passive: false });

      lightbox.addEventListener("touchmove", function (event) {
        if (state.open) {
          event.preventDefault();
        }
      }, { passive: false });

      document.addEventListener("keydown", function (event) {
        if (!state.open) {
          return;
        }

        if (event.key === "Escape") {
          event.preventDefault();
          close();
          return;
        }

        if (event.key === "ArrowRight") {
          event.preventDefault();
          goNext();
          return;
        }

        if (event.key === "ArrowLeft") {
          event.preventDefault();
          goPrevious();
          return;
        }

        if (event.key === "Tab") {
          var focusable = Array.prototype.slice.call(document.querySelectorAll(focusableSelector));
          if (focusable.length === 0) {
            event.preventDefault();
            return;
          }

          var first = focusable[0];
          var last = focusable[focusable.length - 1];
          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        }
      });

      window.__galleryLightbox = {
        open: open,
        close: close,
        next: goNext,
        previous: goPrevious,
        getState: function () {
          return {
            open: state.open,
            galleryId: state.galleryId,
            index: state.index,
            total: state.items.length
          };
        }
      };

      emitState();
    }

    function initControls() {
      var controls = document.getElementById("sidebar-gallery-controls");
      var prevButton = document.getElementById("gallery-prev");
      var nextButton = document.getElementById("gallery-next");
      var closeButton = document.getElementById("gallery-close");
      var sidebar = document.getElementById("site-sidebar");
      var themeToggle = document.getElementById("theme-toggle");
      var mobileQuery = window.matchMedia("(max-width: 800px)");
      var openState = false;

      if (!controls || !prevButton || !nextButton || !closeButton || !sidebar || !themeToggle) {
        return;
      }

      function getMenuOpen() {
        return sidebar.getAttribute("data-menu-open") === "true";
      }

      function refreshVisibility() {
        var isMobile = mobileQuery.matches;
        var menuOpen = getMenuOpen();

        if (!openState) {
          controls.hidden = true;
          controls.setAttribute("data-open", "false");
          themeToggle.classList.remove("theme-toggle-gallery-hidden");
          return;
        }

        if (isMobile && menuOpen) {
          controls.hidden = true;
          controls.setAttribute("data-open", "false");
          themeToggle.classList.remove("theme-toggle-gallery-hidden");
          return;
        }

        controls.hidden = false;
        controls.setAttribute("data-open", "true");

        if (isMobile) {
          themeToggle.classList.add("theme-toggle-gallery-hidden");
        } else {
          themeToggle.classList.remove("theme-toggle-gallery-hidden");
        }
      }

      function callLightbox(methodName) {
        if (!window.__galleryLightbox || typeof window.__galleryLightbox[methodName] !== "function") {
          return;
        }

        window.__galleryLightbox[methodName]();
      }

      prevButton.addEventListener("click", function () {
        callLightbox("previous");
      });

      nextButton.addEventListener("click", function () {
        callLightbox("next");
      });

      closeButton.addEventListener("click", function () {
        callLightbox("close");
      });

      document.addEventListener("gallerylightbox:statechange", function (event) {
        openState = Boolean(event.detail && event.detail.open);
        refreshVisibility();
      });

      if (typeof mobileQuery.addEventListener === "function") {
        mobileQuery.addEventListener("change", refreshVisibility);
      } else if (typeof mobileQuery.addListener === "function") {
        mobileQuery.addListener(refreshVisibility);
      }

      var observer = new MutationObserver(function () {
        refreshVisibility();
      });
      observer.observe(sidebar, { attributes: true, attributeFilter: ["data-menu-open"] });

      refreshVisibility();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", mountGallery);
    } else {
      mountGallery();
    }
  })();
</script>
