<footer class="sidebar-footer">
	<div class="sidebar-footer-left">
		<button class="btn theme-toggle" type="button" id="theme-toggle" aria-haspopup="dialog" aria-controls="theme-modal" aria-expanded="false">
			<span class="theme-pill" aria-hidden="true">
				{% include components/sidebar/theme_toggle_icon.svg %}
			</span>
		</button>
	</div>

	<div class="sidebar-footer-right">
		{% include footer-right.html %}
	</div>

	<div class="theme-modal card" id="theme-modal" role="dialog" aria-modal="false" aria-labelledby="theme-modal-title" hidden>
		<p class="theme-modal-title" id="theme-modal-title">Choose Theme</p>
		<ul class="theme-options">
			<li><button class="btn theme-option" type="button" data-theme-option="light" aria-pressed="false">Light</button></li>
			<li><button class="btn theme-option" type="button" data-theme-option="dark" aria-pressed="false">Dark</button></li>
			<li><button class="btn theme-option" type="button" data-theme-option="system" aria-pressed="false">Device</button></li>
		</ul>
	</div>
</footer>

<script>
	(function () {
		var storageKey = "site-theme";
		var root = document.documentElement;
		var toggle = document.getElementById("theme-toggle");
		var modal = document.getElementById("theme-modal");
		var optionButtons = document.querySelectorAll("[data-theme-option]");

		if (!toggle || !modal || optionButtons.length === 0) {
			return;
		}

		var mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");

		function getPreference() {
			var saved = localStorage.getItem(storageKey);
			return saved === "light" || saved === "dark" || saved === "system" ? saved : "light";
		}

		function setPreference(theme) {
			localStorage.setItem(storageKey, theme);
			root.setAttribute("data-theme", theme);
			refreshUI();
		}

		function getResolvedTheme(preference) {
			if (preference === "system") {
				return mediaQuery.matches ? "dark" : "light";
			}
			return preference;
		}

		function refreshUI() {
			var current = getPreference();
			var resolved = getResolvedTheme(current);

			toggle.setAttribute("data-theme-preference", current);
			toggle.setAttribute("data-resolved-theme", resolved);

			optionButtons.forEach(function (button) {
				button.setAttribute("aria-pressed", button.dataset.themeOption === current ? "true" : "false");
			});
		}

		function openModal() {
			modal.hidden = false;
			toggle.setAttribute("aria-expanded", "true");
		}

		function closeModal() {
			modal.hidden = true;
			toggle.setAttribute("aria-expanded", "false");
		}

		toggle.addEventListener("click", function () {
			if (modal.hidden) {
				openModal();
			} else {
				closeModal();
			}
		});

		optionButtons.forEach(function (button) {
			button.addEventListener("click", function () {
				setPreference(button.dataset.themeOption);
				closeModal();
			});
		});

		document.addEventListener("click", function (event) {
			if (modal.hidden) {
				return;
			}

			if (!modal.contains(event.target) && !toggle.contains(event.target)) {
				closeModal();
			}
		});

		document.addEventListener("keydown", function (event) {
			if (event.key === "Escape" && !modal.hidden) {
				closeModal();
			}
		});

		if (typeof mediaQuery.addEventListener === "function") {
			mediaQuery.addEventListener("change", function () {
				if (getPreference() === "system") {
					refreshUI();
				}
			});
		}

		refreshUI();
	})();
</script>
